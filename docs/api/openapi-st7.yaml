            type: string
        - name: code
          required: true
          in: query
          description: Параметр code из ссылки на почте
          schema:
            example: 587f82e15c85f2bf7c76a6818b0b98be59ba598f46b399faa3adcab97687232bc28d0f44c2a815eb13d15fbb67e8a7e0cfb1d9b7be51390c2aef0529670fe5f3b6a94dae07e39fd071ab4997a4c558408981973f12166f28c81e384ba39f807069fefbd5
